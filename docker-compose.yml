version: '3.8'

networks:
  ecommerce-net:
    driver: bridge

services:
  rabbitmq:
    image: rabbitmq:3.12-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ecommerce-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  customerservice:
    build: ./CustomerService/CustomerService.Api
    container_name: customerservice
    ports:
      - "6002:8080"
    networks:
      - ecommerce-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

  productservice:
    build: ./ProductService/ProductService.Api
    container_name: productservice
    ports:
      - "6001:8080"
    networks:
      - ecommerce-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

  orderservice:
    build: ./OrderService/OrderService.Api
    container_name: orderservice
    ports:
      - "6003:8080"
    networks:
      - ecommerce-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - RabbitMQ__Host=rabbitmq
      - RabbitMQ__Port=5672

  paymentservice:
    build: ./PaymentService/PaymentService.Api
    container_name: paymentservice
    ports:
      - "6004:8080"
    networks:
      - ecommerce-net
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080

  apigateway:
    build: ./APIGateway
    container_name: apigateway
    ports:
      - "5000:8080"
    networks:
      - ecommerce-net
    depends_on:
      - customerservice
      - productservice
      - orderservice
      - paymentservice
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
